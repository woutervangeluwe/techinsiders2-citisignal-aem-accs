<!--
  Brand Concierge (Experience League 1.4.2).
  CSP: script-src includes nonce-aem + strict-dynamic, so unsafe-inline does not apply to inline
  scripts — every inline block below must use nonce="aem" or the browser will not run it.
  Timing: #brand-concierge-mount is set in blocks/brandconcierge/brandconcierge.js during
  loadBlock(), which runs after DOMContentLoaded. We start sendEvent/bootstrap on custom event
  aem-brand-concierge-mount (not DOMContentLoaded alone) so the mount exists.
  brandconciergemain uses id adobe-brand-concierge-client-alloy so Alloy skips injecting a duplicate.
-->
<script nonce="aem" src="/scripts/styleconfigurations.js"></script>
<script nonce="aem">
  !function (n, o) {
    o.forEach(function (o) {
      n[o] || ((n.__alloyNS = n.__alloyNS ||
        []).push(o), n[o] = function () {
          var u = arguments; return new Promise(
            function (i, l) { n[o].q.push([i, l, u]) })
        }, n[o].q = [])
    })
  }
    (window, ['alloy']);
</script>
<script nonce="aem" src="/scripts/alloy.js"></script>
<script nonce="aem" src="/scripts/brandconciergemain.js" id="adobe-brand-concierge-client-alloy"></script>
<script nonce="aem">
  alloy('configure', {
    defaultConsent: 'in',
    edgeDomain: 'edge.adobedc.net',
    edgeBasePath: 'ee',
    datastreamId: '15e6d31d-061a-4967-bd61-c5c39deb4a5b',
    orgId: '907075E95BF479EC0A495C73@AdobeOrg',
    debugEnabled: true,
    idMigrationEnabled: false,
    thirdPartyCookiesEnabled: false,
    prehidingStyle: '.personalization-container { opacity: 0 !important }',
  });

  window.addEventListener('aem-brand-concierge-mount', function brandConciergeStart() {
    window.removeEventListener('aem-brand-concierge-mount', brandConciergeStart);
    window.alloy('sendEvent', {
      conversation: {
        fetchConversationalExperience: true,
      },
    }).then((result) => {
      console.log('Conversation experience fetched', result);
      return window.alloy('bootstrapConversationalExperience', {
        selector: '#brand-concierge-mount',
        src: '/scripts/brandconciergemain.js',
        stylingConfigurations: window.styleConfiguration,
        stickySession: true,
      });
    }).catch((err) => {
      console.error('[Brand Concierge] sendEvent or bootstrap failed:', err);
    });
  });
</script>
